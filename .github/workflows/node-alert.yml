name: Node Alert

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: node-alert-monitor
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  check-tail-nodes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: node-alert

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: node-alert/package-lock.json

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: node-alert/.alert-state
          key: node-alert-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            node-alert-state-

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare alert state
        run: mkdir -p .alert-state

      - name: Check Online Tail nodes
        env:
          ALERT_TO: akhil.js33@gmail.com
          CHECK_INTERVAL_MS: "60000"
          LOOP_COUNT: "5"
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
        run: npm run check

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: node-alert/.alert-state
          key: node-alert-state-${{ github.run_id }}-${{ github.run_attempt }}
