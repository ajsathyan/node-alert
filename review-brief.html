<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Node Alert Review Brief</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #1d1f23;
      --muted: #626973;
      --line: #d8dbdf;
      --accent: #0f766e;
      --warn: #9a3412;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111315;
        --panel: #1a1d21;
        --text: #f1f3f4;
        --muted: #a3a9b1;
        --line: #30353b;
        --accent: #2dd4bf;
        --warn: #fdba74;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1040px, calc(100vw - 32px));
      margin: 32px auto 56px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }
    .meta, .muted { color: var(--muted); }
    .status {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--panel);
      min-width: 180px;
      text-align: right;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 18px;
      margin-top: 20px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .feed {
      display: grid;
      gap: 12px;
    }
    .item {
      border-left: 3px solid var(--accent);
      padding: 8px 0 8px 12px;
    }
    .item h3 {
      margin: 0 0 4px;
      font-size: 15px;
    }
    .handles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .handle {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 12px;
    }
    dl {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 12px;
      margin: 0;
    }
    dt { color: var(--muted); }
    dd { margin: 0; }
    .record {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }
    .error {
      color: var(--warn);
      border-color: var(--warn);
    }
    @media (max-width: 760px) {
      header, .grid { display: block; }
      .status { margin-top: 14px; text-align: left; }
      section { margin-top: 14px; }
      dl { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="title">Node Alert Review Brief</h1>
        <div class="meta" id="subtitle">Loading review data...</div>
      </div>
      <div class="status">
        <strong id="status">Loading</strong>
        <div class="muted" id="updated">Waiting for JSON</div>
      </div>
    </header>
    <div class="grid">
      <section>
        <h2>Review Feed</h2>
        <div class="feed" id="feed"></div>
      </section>
      <section>
        <h2>Record Trail</h2>
        <div id="records"></div>
      </section>
    </div>
  </main>
  <script>
    const text = (node, value) => { node.textContent = value || ""; };
    const el = (tag, className) => {
      const node = document.createElement(tag);
      if (className) node.className = className;
      return node;
    };
    const listHandles = (handles) => {
      const wrap = el("div", "handles");
      (handles || []).forEach((handle) => {
        const badge = el("span", "handle");
        text(badge, handle);
        wrap.appendChild(badge);
      });
      return wrap;
    };
    const render = (data) => {
      text(document.getElementById("title"), data.project || "Node Alert Review Brief");
      text(document.getElementById("subtitle"), data.summary || "");
      text(document.getElementById("status"), data.status || "Unknown");
      text(document.getElementById("updated"), data.updatedAt || "");

      const feed = document.getElementById("feed");
      feed.replaceChildren();
      (data.snapshots || []).forEach((snapshot) => {
        const item = el("article", "item");
        const title = el("h3");
        text(title, snapshot.title);
        const done = el("div");
        text(done, `Done: ${snapshot.doneSummary || "None"}`);
        const needs = el("div", "muted");
        text(needs, `Needs you: ${snapshot.needsYouSummary || "None"}`);
        item.append(title, done, needs, listHandles(snapshot.links));
        feed.appendChild(item);
      });

      const records = document.getElementById("records");
      records.replaceChildren();
      const groups = [
        ["Change Units", data.changeUnits],
        ["Notes", data.notes],
        ["Proof", data.proof]
      ];
      groups.forEach(([label, entries]) => {
        const group = el("div", "record");
        const heading = el("h3");
        text(heading, label);
        group.appendChild(heading);
        (entries || []).forEach((entry) => {
          const row = el("p");
          text(row, `${entry.id}: ${entry.title || entry.summary || entry.status || ""}`);
          group.appendChild(row);
        });
        records.appendChild(group);
      });
    };
    fetch("review-brief-data.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(render)
      .catch((error) => {
        const feed = document.getElementById("feed");
        feed.replaceChildren();
        const box = el("article", "item error");
        text(box, `Could not load review-brief-data.json: ${error.message}`);
        feed.appendChild(box);
        text(document.getElementById("status"), "Recovery needed");
      });
  </script>
</body>
</html>
